# ============================================================
# 04a_bitbucket_pipeline.yml
# 主題：Bitbucket Pipelines CI/CD
#
# 放在 repo 根目錄，命名為 bitbucket-pipelines.yml
# Bitbucket 偵測到 push 時自動執行。
#
# 流程：
#   push to main
#     → 跑測試
#     → 觸發 SageMaker Pipeline（訓練→評估→登記）
#     → 等待 pipeline 完成
#     → 若模型 Approved → 更新 Endpoint
# ============================================================

image: python:3.11   # 使用的 Docker image

definitions:
  # 可重複使用的步驟片段
  steps:
    - step: &install-deps
        name: Install Dependencies
        caches:
          - pip
        script:
          - pip install boto3 sagemaker transformers datasets evaluate torch --quiet

pipelines:

  # ── 每次 push 都跑（所有 branch）──
  default:
    - step:
        name: Run Unit Tests
        image: python:3.11
        script:
          - pip install pytest torch transformers --quiet
          - pytest tests/ -v --tb=short || true   # 測試失敗不阻止後續（可依需求改）

  # ── 只有 push 到 main 才跑完整部署流程 ──
  branches:
    main:
      - step:
          name: "Step 1: Run Tests"
          image: python:3.11
          caches:
            - pip
          script:
            - pip install pytest torch transformers --quiet
            - pytest tests/ -v --tb=short

      - step:
          name: "Step 2: Trigger SageMaker Pipeline"
          image: python:3.11
          caches:
            - pip
          # AWS 憑證從 Bitbucket Repository Variables 讀取
          # 設定位置：Repository → Settings → Repository variables
          # 加入：AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
          script:
            - pip install boto3 sagemaker --quiet
            - python -c "
              import boto3, json, os

              region = os.environ['AWS_DEFAULT_REGION']
              sm = boto3.client('sagemaker', region_name=region)

              # 觸發 SageMaker Pipeline
              response = sm.start_pipeline_execution(
                  PipelineName='mlops-sentiment-pipeline',
                  PipelineExecutionDisplayName=f'bitbucket-{os.environ.get(\"BITBUCKET_BUILD_NUMBER\", \"manual\")}',
                  PipelineParameters=[
                      {'Name': 'AccuracyThreshold', 'Value': '0.75'},
                      {'Name': 'ModelApprovalStatus', 'Value': 'PendingManualApproval'},
                  ],
              )

              execution_arn = response['PipelineExecutionArn']
              print(f'Pipeline 啟動：{execution_arn}')

              # 等待完成
              import time
              while True:
                  status = sm.describe_pipeline_execution(
                      PipelineExecutionArn=execution_arn
                  )['PipelineExecutionStatus']
                  print(f'狀態：{status}')
                  if status in ['Succeeded', 'Failed', 'Stopped']:
                      break
                  time.sleep(30)

              if status != 'Succeeded':
                  raise Exception(f'Pipeline 失敗：{status}')

              print('Pipeline 完成！')
              "

      - step:
          name: "Step 3: Update Endpoint (if model approved)"
          image: python:3.11
          trigger: manual   # 部署需要手動確認
          script:
            - pip install boto3 sagemaker --quiet
            - python -c "
              import boto3, json, os, sagemaker
              from sagemaker.huggingface import HuggingFaceModel

              region = os.environ['AWS_DEFAULT_REGION']
              sm     = boto3.client('sagemaker', region_name=region)

              # 取得最新 Approved 模型
              packages = sm.list_model_packages(
                  ModelPackageGroupName='mlops-sentiment-model-group',
                  ModelApprovalStatus='Approved',
                  SortBy='CreationTime',
                  SortOrder='Descending',
              )

              if not packages['ModelPackageSummaryList']:
                  print('沒有 Approved 的模型，跳過部署')
                  exit(0)

              latest_arn = packages['ModelPackageSummaryList'][0]['ModelPackageArn']
              print(f'部署模型：{latest_arn}')

              # 更新 Endpoint
              session = sagemaker.Session()
              model   = HuggingFaceModel(
                  model_data=latest_arn,
                  role=os.environ['SAGEMAKER_ROLE_ARN'],
                  transformers_version='4.37',
                  pytorch_version='2.1',
                  py_version='py310',
              )
              model.deploy(
                  initial_instance_count=1,
                  instance_type='ml.m5.large',
                  endpoint_name='mlops-sentiment-endpoint',
                  update_endpoint=True,
              )
              print('Endpoint 更新完成！')
              "

  # ── PR 建立時跑測試 ──
  pull-requests:
    '**':
      - step:
          name: "PR: Run Tests"
          image: python:3.11
          script:
            - pip install pytest torch transformers --quiet
            - pytest tests/ -v --tb=short

# ============================================================
# Bitbucket Repository Variables 設定說明：
# （Repository → Settings → Repository variables）
#
#   AWS_ACCESS_KEY_ID      → 你的 AWS Access Key
#   AWS_SECRET_ACCESS_KEY  → 你的 AWS Secret Key（設為 Secured）
#   AWS_DEFAULT_REGION     → us-west-2
#   SAGEMAKER_ROLE_ARN     → SageMaker Execution Role ARN
# ============================================================
